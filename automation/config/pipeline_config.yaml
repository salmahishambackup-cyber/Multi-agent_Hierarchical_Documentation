# GenAI Multi-Stage Pipeline Configuration
# This file configures the end-to-end automation workflow

pipeline:
  stage1:
    name: "Repository Analysis & Module Decomposition"
    type: "local"
    entry_point: "proj-GenAI/src/main.py"
    input:
      repo_url: "https://github.com/AsyncFuncAI/deepwiki-open.git"
    output:
      base_dir: "proj-GenAI/src/data/artifacts"
      include:
        - "ast/"
        - "components/"
        - "dependencies/"

  stage2:
    name: "Recursive Documentation Generation"
    type: "colab"
    notebook_name: "GenAI_Pipeline_Stage2.ipynb"
    input:
      # This is populated from Stage 1 output
      artifacts_dir: "{DRIVE_PATH}/genai_pipeline_stage2_input"
    output:
      base_dir: "{DRIVE_PATH}/genai_pipeline_stage2_output"
    gpu_runtime: true
    colab_resource_limits:
      max_runtime_seconds: 3600  # 1 hour
      
google_drive:
  folder_name: "GenAI_Pipeline_Automation"
  subfolder_structure:
    inputs: "stage2_inputs"
    outputs: "stage2_outputs"
    backups: "backups"
    logs: "execution_logs"

execution:
  cleanup_local_temp: true
  keep_drive_backups: true
  max_upload_retries: 3
  timeout_minutes: 120
  verbose: true

logging:
  level: "INFO"
  log_file: "automation_pipeline.log"
  capture_stage_logs: true
